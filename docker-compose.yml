version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # Backend API — FastAPI + SQLite
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend/healthai-backend
      dockerfile: Dockerfile
    container_name: healthai-backend
    ports:
      - "8010:8010"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=HealthAI API
      - DATABASE_URL=sqlite:///./healthai.db
      - REDIS_URL=redis://redis:6379/0
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8001
    volumes:
      - ./backend/healthai-backend:/app
      - healthai_db:/app
    networks:
      - healthai-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # Recommendation Microservice — FastAPI + MongoDB
  # ═══════════════════════════════════════════════════════════════
  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: healthai-recommendations
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=healthai_recommendations
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MAIN_API_URL=http://backend:8010
      - ENVIRONMENT=production
    networks:
      - healthai-network
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # Frontend Application — React + Vite
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./front/healthai-front
      dockerfile: Dockerfile
    container_name: healthai-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8010
      - VITE_REC_SERVICE_URL=http://localhost:8001/api/v1
    volumes:
      - ./front/healthai-front:/app
      - /app/node_modules
    networks:
      - healthai-network
    depends_on:
      - backend
      - recommendation-service
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # Redis — Cache
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: healthai-redis
    volumes:
      - redis_data:/data
    networks:
      - healthai-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ═══════════════════════════════════════════════════════════════
  # MongoDB — Recommendations storage
  # ═══════════════════════════════════════════════════════════════
  mongo:
    image: mongo:7
    container_name: healthai-mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - healthai-network
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=healthai_recommendations

  # ═══════════════════════════════════════════════════════════════
  # Prometheus — Metrics collection
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: healthai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - healthai-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - backend

  # ═══════════════════════════════════════════════════════════════
  # Grafana — Dashboards
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: healthai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=healthai2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - healthai-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  healthai-network:
    driver: bridge

volumes:
  healthai_db:
    driver: local
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data:
